name: downstream-zarr

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/commands/midpoints/**"
      - "src/shared/io.rs"
      - "src/shared/io_tests.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "tests/generate_downstream_midpoint_fixture.rs"
      - "tests/fixtures/**"
      - "downstream_tests/**"
      - ".github/workflows/downstream-zarr.yml"
      - "website/docs/guides/fragment_midpoints_guide.md"

concurrency:
  group: downstream-zarr-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-midpoint-fixture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust fixture system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - name: Generate midpoint Zarr fixture with cfDNAlab
        env:
          CFDNALAB_DOWNSTREAM_FIXTURE_DIR: downstream_tests/tmp
        run: cargo test --no-default-features --features cmd_midpoints --test generate_downstream_midpoint_fixture -- --ignored --exact generate_midpoint_zarr_fixture_with_cfdnalab

      - name: Upload midpoint Zarr fixture
        uses: actions/upload-artifact@v4
        with:
          name: midpoint-zarr-fixture
          path: downstream_tests/tmp

  python:
    needs: generate-midpoint-fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: downstream_tests/requirements-python.txt

      - name: Install Python downstream packages
        run: python -m pip install -r downstream_tests/requirements-python.txt

      - name: Download cfDNAlab-generated midpoint Zarr fixture
        uses: actions/download-artifact@v4
        with:
          name: midpoint-zarr-fixture
          path: downstream_tests/tmp

      - name: Run Python downstream tests
        env:
          CFDNALAB_MIDPOINT_ZARR: downstream_tests/tmp/tiny.midpoint_profiles.zarr
        run: pytest downstream_tests/python

  r:
    needs: generate-midpoint-fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cfDNAlab-generated midpoint Zarr fixture
        uses: actions/download-artifact@v4
        with:
          name: midpoint-zarr-fixture
          path: downstream_tests/tmp

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R package system libraries
        run: sudo apt-get update && sudo apt-get install -y libblosc-dev libzstd-dev

      - name: Install R downstream packages
        shell: Rscript {0}
        run: |
          install.packages("zarr", repos = c("https://cloud.r-project.org"))
          if (!requireNamespace("BiocManager", quietly = TRUE)) {
            install.packages("BiocManager", repos = c("https://cloud.r-project.org"))
          }
          BiocManager::install("Rarr", ask = FALSE, update = FALSE)

      - name: Run Rarr downstream test
        env:
          CFDNALAB_MIDPOINT_ZARR: downstream_tests/tmp/tiny.midpoint_profiles.zarr
        run: Rscript downstream_tests/R/test_midpoint_zarr_rarr.R

      - name: Run CRAN zarr downstream test
        env:
          CFDNALAB_MIDPOINT_ZARR: downstream_tests/tmp/tiny.midpoint_profiles.zarr
        run: Rscript downstream_tests/R/test_midpoint_zarr_cran_zarr.R

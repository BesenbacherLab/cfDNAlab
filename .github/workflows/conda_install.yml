name: CondaInstall

on:
  workflow_dispatch:
  schedule:
    - cron: "19 5 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up documented conda environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: cfdnalab
          create-args: >-
            rust=1.94.0
            zstandard
            perl
            fontconfig
            conda-forge::clang=21.*
            conda-forge::clangdev=21.*
            conda-forge::libclang=21.*
            conda-forge::llvmdev=21.*
          post-cleanup: all

      - name: Check each released command feature without warnings
        run: |
          export LIBCLANG_PATH="$CONDA_PREFIX/lib"
          export RUSTFLAGS="-D warnings"

          released_command_features=(
            cmd_bam_to_bam
            cmd_bam_to_frag
            cmd_coverage_weights
            cmd_ends
            cmd_fcoverage
            cmd_fragment_count_weights
            cmd_frag_to_bam
            cmd_gc_bias
            cmd_lengths
            cmd_midpoints
          )

          for feature in "${released_command_features[@]}"; do
            echo "::group::cargo check ${feature}"
            cargo check --locked --no-default-features --features "${feature}"
            echo "::endgroup::"

            echo "::group::cargo check cli,${feature}"
            cargo check --locked --no-default-features --features "cli,${feature}"
            echo "::endgroup::"
          done

      - name: Install checked-out cfDNAlab package
        run: |
          export LIBCLANG_PATH="$CONDA_PREFIX/lib"
          cargo install --path . --locked --force

      - name: Verify installed binary
        run: cfdna --help

name: CondaInstall

on:
  workflow_dispatch:
  schedule:
    - cron: "19 5 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -leo pipefail {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up documented conda environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: cfdnalab
          create-args: >-
            rust=1.94.0
            zstandard
            perl
            fontconfig
            conda-forge::clang=21.*
            conda-forge::clangdev=21.*
            conda-forge::libclang=21.*
            conda-forge::llvmdev=21.*
          post-cleanup: all

      - name: Install checked-out cfDNAlab package
        run: |
          export LIBCLANG_PATH="$CONDA_PREFIX/lib"
          cargo install --path . --locked --force

      - name: Verify installed binary
        run: cfdna --help
